name: Promote dev → main

on:
  push:
    branches: [dev]
  # P15 close — run the full ci gate (migrate→build:ci on the mock DB, secret
  # guards) on PRs to dev too. The promote job stays push-only.
  pull_request:
    branches: [dev]

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    # ══ D4 / SD2 — CI BUILD SAFETY (DO NOT "FIX" THIS BACK) ══════════════════
    # The build below runs against a DISPOSABLE, EMPTY postgres service with
    # publicly-visible mock credentials — BY DESIGN. Production credentials
    # must NEVER enter CI: `build:ci` deliberately skips `payload migrate`, and
    # this job exists only to prove the code compiles and the Next bundle
    # builds. The mock DB satisfies payload.config's DATABASE_URI requirement
    # and absorbs any lazy connection during `next build` without any real
    # data being reachable. The "Secret-pattern guard" steps enforce this.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mock
          POSTGRES_PASSWORD: mock
          POSTGRES_DB: mock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # D4/SD2 guard #1: no real-credential fingerprints may live in workflows.
      # (postgres URLs other than the documented mock, API-key prefixes, PEM keys)
      - name: Secret-pattern guard (workflows)
        run: |
          set -e
          PATTERNS='postgres(ql)?://(?!mock:mock@localhost)[^ "]+|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY'
          if grep -rPn "$PATTERNS" .github/workflows/; then
            echo '::error::Real-credential fingerprint found in workflow files (SD2).'
            exit 1
          fi
          echo 'Workflows clean: only the documented mock connection string is present.'

      - run: npm ci

      - name: Domain check
        run: npm run check:domain

      - name: Type check
        run: npx tsc --noEmit

      # Regression guard (static, no DB): block any NEW localization migration
      # that drops a base column without backfilling its _locales table — the
      # exact footgun behind the Phase-15 title/excerpt loss (20260711_184910).
      - name: Migration safety lint
        run: node scripts/ci/migration-safety-lint.ts

      # D6: apply the FULL committed migration chain to the disposable mock DB
      # before building — proves every migration runs from zero AND gives the
      # build real tables to query. This step failing = the job fails (a broken
      # migration chain must never reach the production deploy pipeline).
      - name: Apply migration chain (disposable mock DB — D6)
        env:
          DATABASE_URI: postgres://mock:mock@localhost:5432/mock
          PAYLOAD_SECRET: ci-mock-payload-secret-not-production
        run: npx payload migrate --force-accept-warning

      # D4: the real build gate — migration-free build:ci against the mock DB.
      # PAYLOAD_SECRET is a mock too: it only signs cookies of a server that
      # never serves traffic. INDEXNOW_DISABLE per SD5 (no pings from CI).
      - name: Build (build:ci, mock DB — SD2)
        env:
          DATABASE_URI: postgres://mock:mock@localhost:5432/mock
          PAYLOAD_SECRET: ci-mock-payload-secret-not-production
          INDEXNOW_DISABLE: 'true'
        run: npm run build:ci

      # D4/SD2 guard #2: the produced bundle must not embed real-looking secrets.
      - name: Secret-pattern guard (build artifacts)
        run: |
          set -e
          PATTERNS='postgres(ql)?://(?!mock:mock@localhost)[a-zA-Z0-9_.:-]+@|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY'
          if grep -rPnI --include='*.js' --include='*.json' -m1 "$PATTERNS" .next/ 2>/dev/null | head -5 | grep .; then
            echo '::error::Real-credential fingerprint found in build output (SD2).'
            exit 1
          fi
          echo 'Build artifacts clean.'

  promote:
    needs: ci
    # Push-to-dev only: PRs run ci but never auto-promote.
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Fast-forward main to dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --ff-only origin/dev
          git push origin main
